# MM-OR train-split pseudo-label generation (DisPOSE preparation).
# Mirrors COMPOSE's experiments/mm_or.yaml base (single_hedge_score 1.15,
# pixel_threshold 4096). generate.py injects detections_path, sequences, and
# interval at runtime — MM-OR train sequences are discovered from the filesystem
# by the dataset spec.

dataset: mm_or
dataset_path: ./data/mm_or
batch_size: 1
cameras: MMOR5
N: 10
J: 15

hedge_conf_thresh: 0.4
single_hedge_score: 1.15
root_min_conf: 0.2
triangulation_threshold: 0.3
confidence_threshold: 0.3
lam: 2.5
score_joint_indices: [-1]

cues:
  - kind: geometric
    name: reprojection
    score_type: reprojection
    lam: 0.01
    pixel_threshold: 4096.0

save_video: false

splits:
  train:
    num_workers: 4
    matching_solver: ilp
    # detections_path / sequences / interval are injected by generate.py
