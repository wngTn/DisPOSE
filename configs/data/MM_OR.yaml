# 1. Defaults must be at the top level
defaults:
  - /data/augmentations@train_cfg.dataset.transforms: standard_augmentations
  - /data/augmentations@val_cfg.dataset.transforms: no_augmentations
  - _self_

_target_: src.data.joint_datamodule.JointDataModule

train_cfg:
    loader_params:
        num_workers: 10
        pin_memory: True
        persistent_workers: True

    batch_sampler:
        # batch_size lives in the task config — see note in configs/data/Panoptic.yaml.
        _target_: src.data.samplers.CommonSampler
        _partial_: True
        random: True

    # Parameters for the Dataset
    dataset:
        _target_: src.data.datasets.MMORDataset
        _partial_: True
        loader:
            _target_: src.data.datasets.mm_or_utils.PseudoGTDataLoader
            _partial_: True
            label_file: "./data/preparation/mm_or/2026_06_04_15_39_train/panoptic_2026_06_04_15_39_pseudo_labels.pkl"
            min_visible_joints: 12
        collate_fn: 
            _target_: src.data.collate_fn.custom_collate
            _partial_: True
        data_dir: "./data/mm_or"
        augmentations:
            scale_factors: [0.35, 0.35]
            rotation_factors: [45, 45]
            flip_factors: [False, False]
        num_temporal: 1
        interval: 1
        camera_setup: "MMOR5"
        skeleton_type: "panoptic"
        image_size: [768, 576]
        heatmap_size: [192, 144]
        sequences: [
            "001_PKA",
            "003_TKA",
            "006_PKA",
            "008_PKA",
            "010_PKA",
            "012_PKA",
            "013_PKA",
            "014_PKA",
            "015-018_PKA",
            "019-022_PKA",
            "023-032_PKA",
            "033_PKA",
            "035_PKA",
            "037_TKA"
        ]

val_cfg:
    loader_params:
        num_workers: 12
        pin_memory: True
        persistent_workers: True

    batch_sampler:
        # See note in train_cfg.batch_sampler.
        _target_: src.data.samplers.InferenceSampler
        _partial_: True
        shuffle: False
        
    # Parameters for the Dataset
    dataset:
        _target_: src.data.datasets.MMORDataset
        _partial_: True
        loader:
            _target_: src.data.datasets.mm_or_utils.GTDataLoader
            _partial_: True
        collate_fn: 
            _target_: src.data.collate_fn.custom_collate
            _partial_: True
        data_dir: "./data/mm_or"
        augmentations:
            scale_factors: []
            rotation_factors: []
            flip_factors: []
        num_temporal: 1
        interval: 1
        camera_setup: "MMOR5"
        skeleton_type: "panoptic"
        image_size: [768, 576]
        heatmap_size: [192, 144]
        sequences: [
            "004_PKA",
            "011_TKA",
            "036_PKA",
            "038_TKA",
        ]

test_cfg: