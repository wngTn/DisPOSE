# This file defines a custom "evaluation" profile for Hydra's own behavior.

# Use colorlog for logging in the console
defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog

run:
  dir: ${paths.log_dir}/${task}/${task_name}
output_subdir: null

job_logging:
  handlers:
    file:
      # Incorporates fix from https://github.com/facebookresearch/hydra/pull/2242
      filename: ${paths.output_dir}/eval_${now:%Y-%m-%d}_${now:%H-%M-%S}.log